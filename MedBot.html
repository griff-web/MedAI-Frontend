<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-7 // ENHANCED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #0a0a12 0%, #000000 100%);
            font-family: 'Fira Code', monospace;
            color: #00ffcc;
            overflow: hidden;
        }
        .glass {
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.05);
        }
        .glitch {
            text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { text-shadow: 1px 0 #ff00ff; }
            50% { text-shadow: -2px 0 #00ffff; }
            100% { text-shadow: 1px 0 #ff00ff; }
        }
        /* Markdown Styling */
        .ai-response pre { background: #000; padding: 10px; border-radius: 5px; border: 1px solid #10b98133; margin: 10px 0; overflow-x: auto; }
        .ai-response code { color: #ff00ff; }
        .typing-cursor::after { content: "█"; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #10b98144; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-2 md:p-6">
    
    <div class="w-full max-w-4xl h-[90vh] flex flex-col glass rounded-sm relative border-t-4 border-emerald-500">
        <header class="p-3 border-b border-emerald-900/50 flex justify-between items-center bg-black/40">
            <div class="flex items-center gap-4">
                <span class="glitch text-xs font-black tracking-tighter">NEXUS-7 v2.0</span>
                <div class="hidden md:block h-1 w-24 bg-emerald-900/30 rounded-full overflow-hidden">
                    <div class="h-full bg-emerald-500 w-1/3 animate-[pulse_2s_infinite]"></div>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="clearSystem()" class="text-[10px] hover:text-red-500 transition-colors">[PURGE_MEMORY]</button>
                <div class="text-[10px] text-emerald-500/50">SYSTEM_STABLE</div>
            </div>
        </header>

        <div class="px-4 py-2 bg-emerald-950/10 flex items-center gap-2 border-b border-emerald-900/20">
            <span class="text-[10px] text-emerald-700">AUTH_KEY:</span>
            <input type="password" id="api-key" placeholder="••••••••••••••••" 
                   class="bg-transparent text-xs w-full outline-none text-emerald-400 focus:placeholder-transparent">
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 text-sm ai-response">
            <div class="text-emerald-500/40 text-xs">
                > BOOT SEQUENCE COMPLETE...<br>
                > ALL SYSTEMS NOMINAL.<br>
                > STANDBY FOR USER COMMAND...
            </div>
        </div>

        <div id="loading" class="hidden px-6 py-2 text-[10px] text-emerald-400/50 animate-pulse tracking-widest">
            [DOWNLOAD_IN_PROGRESS...]
        </div>

        <footer class="p-4 bg-black/60 border-t border-emerald-900/50">
            <div class="flex gap-3">
                <span class="text-emerald-500 animate-pulse">#_</span>
                <input type="text" id="user-input" autocomplete="off" placeholder="Enter query..." 
                       class="flex-1 bg-transparent outline-none text-emerald-300 placeholder:text-emerald-900/50">
            </div>
        </footer>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const apiKeyField = document.getElementById('api-key');
        const loading = document.getElementById('loading');
        
        let chatSession = null;

        // 1. Load Saved Key
        if(localStorage.getItem('nexus_key')) {
            apiKeyField.value = localStorage.getItem('nexus_key');
        }

        // 2. Enhanced Typewriter with Markdown Support
        async function displayAIResponse(text) {
            const botWrapper = document.createElement('div');
            botWrapper.className = "border-l border-emerald-500/20 pl-4 py-1";
            botWrapper.innerHTML = `<span class="text-[10px] block text-emerald-700 font-bold mb-1">NEXUS_OS:</span>`;
            const content = document.createElement('div');
            content.className = "typing-cursor text-emerald-100 leading-relaxed";
            botWrapper.appendChild(content);
            chatWindow.appendChild(botWrapper);

            // Type the raw text, then render markdown at the end
            let i = 0;
            const interval = setInterval(() => {
                content.innerText += text.charAt(i);
                i++;
                chatWindow.scrollTop = chatWindow.scrollHeight;
                if (i >= text.length) {
                    clearInterval(interval);
                    content.classList.remove('typing-cursor');
                    // Convert to Markdown
                    content.innerHTML = marked.parse(text);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            }, 10);
        }

        window.handleSend = async () => {
            const text = userInput.value.trim();
            const key = "AIzaSyAROcK27ByBWLd2WKW2jEEMg2W2HyJ-FnY";
            if (!text || !key) return;

            // Save key for next time
            localStorage.setItem('nexus_key', key);

            // User UI
            const userMsg = document.createElement('div');
            userMsg.className = "text-right";
            userMsg.innerHTML = `<span class="text-[10px] text-emerald-700 block">LOCAL_USER</span>
                                 <span class="text-white bg-emerald-900/20 px-3 py-1 rounded-sm">${text}</span>`;
            chatWindow.appendChild(userMsg);
            
            userInput.value = '';
            loading.classList.remove('hidden');

            try {
                if (!chatSession) {
                    const genAI = new GoogleGenerativeAI(key);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    chatSession = model.startChat({ history: [] });
                }

                const result = await chatSession.sendMessage(text);
                const responseText = await result.response.text();
                
                loading.classList.add('hidden');
                await displayAIResponse(responseText);

            } catch (err) {
                loading.classList.add('hidden');
                const errBox = document.createElement('div');
                errBox.className = "text-red-500 text-[10px] border border-red-900/50 p-2 bg-red-950/20";
                errBox.innerText = `[!] KERNEL_PANIC: ${err.message}`;
                chatWindow.appendChild(errBox);
            }
        };

        window.clearSystem = () => {
            localStorage.removeItem('nexus_key');
            location.reload();
        };

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
