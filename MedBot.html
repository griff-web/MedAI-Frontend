<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSync AI | Clinical Co-Pilot</title>
    <style>
        :root {
            --primary-patient: #0d9488;
            --primary-doctor: #4f46e5;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border 0.3s ease;
            border: 2px solid var(--primary-patient);
        }

        .chat-container.doctor-mode {
            border-color: var(--primary-doctor);
        }

        /* Header */
        header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mode-toggle {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
        }

        .mode-btn {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: var(--primary-patient);
            color: white;
        }

        .doctor-mode .mode-btn.active {
            background: var(--primary-doctor);
        }

        /* Chat Area */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .bot {
            background: #f1f5f9;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user {
            background: var(--primary-patient);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .doctor-mode .user {
            background: var(--primary-doctor);
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
        }

        button#send-btn {
            background: var(--primary-patient);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .doctor-mode button#send-btn {
            background: var(--primary-doctor);
        }

        .tech-data {
            font-family: 'Courier New', Courier, monospace;
            background: #1e293b;
            color: #38bdf8;
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="chat-container" id="main-container">
    <header>
        <div>
            <strong style="font-size: 1.2rem;">MediSync AI</strong>
            <div id="status" style="font-size: 0.7rem; color: #64748b;">Ready for Patient Query</div>
        </div>
        <div class="mode-toggle">
            <button class="mode-btn active" id="patient-tab" onclick="setMode('patient')">Patient</button>
            <button class="mode-btn" id="doctor-tab" onclick="setMode('doctor')">Doctor</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="message bot">
            Hello! I am MediSync. Switch to <strong>Doctor mode</strong> for clinical data, or stay in <strong>Patient mode</strong> for simple explanations. How can I help?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a medical term or symptom..." onkeypress="handleKey(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let currentMode = 'patient';

    function setMode(mode) {
        currentMode = mode;
        const container = document.getElementById('main-container');
        const pBtn = document.getElementById('patient-tab');
        const dBtn = document.getElementById('doctor-tab');
        const status = document.getElementById('status');

        if (mode === 'doctor') {
            container.classList.add('doctor-mode');
            dBtn.classList.add('active');
            pBtn.classList.remove('active');
            status.innerText = "Authorized: Clinical Access Enabled";
        } else {
            container.classList.remove('doctor-mode');
            pBtn.classList.add('active');
            dBtn.classList.remove('active');
            status.innerText = "Ready for Patient Query";
        }
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        
        if (input.value.trim() === "") return;

        // Add User Message
        const userMsg = document.createElement('div');
        userMsg.className = 'message user';
        userMsg.innerText = input.value;
        chatWindow.appendChild(userMsg);

        const query = input.value.toLowerCase();
        input.value = "";

        // Simulate Bot Delay
        setTimeout(() => {
            const botMsg = document.createElement('div');
            botMsg.className = 'message bot';
            botMsg.innerHTML = getResponse(query);
            chatWindow.appendChild(botMsg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 600);
    }

    function getResponse(text) {
        if (currentMode === 'patient') {
            if (text.includes('hypertension')) {
                return "<strong>Hypertension</strong> is just high blood pressure. Think of it like water pressing too hard against the walls of your garden hose. Over time, it can wear the hose out.";
            }
            if (text.includes('diabetes')) {
                return "<strong>Diabetes</strong> means your body has trouble moving sugar from your blood into your cells for energy. It's like having a key (insulin) that doesn't quite fit the lock anymore.";
            }
            return "That's an interesting question. In simple terms, that condition affects how your body processes information. Would you like me to explain the symptoms?";
        } else {
            // Doctor Mode
            if (text.includes('hypertension')) {
                return "<strong>Clinical Summary: Hypertension</strong><br>Persistent elevation in systemic arterial blood pressure (Systolic &ge; 140 mmHg). <div class='tech-data'>ICD-10: I10 | Recommended: ACE inhibitors or ARBs for primary management.</div>";
            }
            if (text.includes('diabetes')) {
                return "<strong>Endocrine Profile: Diabetes Mellitus</strong><br>Metabolic disorder characterized by hyperglycemia resulting from defects in insulin secretion or action.<div class='tech-data'>Check: HbA1c levels, fasting plasma glucose, and GFR for renal complications.</div>";
            }
            return "Query processed. Please provide specific biomarkers or ICD-10 codes for a more detailed differential diagnosis.";
        }
    }
</script>

</body>
</html>
