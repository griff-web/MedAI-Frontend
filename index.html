<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Med-AI </title>
  
  <!-- Ultra-fast favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300FF88' stroke='%2300D4FF' stroke-width='2'/%3E%3Cpath d='M30 50 L45 50 L50 30 L55 50 L70 50 L55 65 L60 80 L50 70 L40 80 L45 65 L30 50' fill='%23000'/%3E%3C/svg%3E">
  
  <!-- Meta tags for PWA feel -->
  <meta name="theme-color" content="#00FF88">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Medical AI Diagnostic Interface">
  
  <!-- Fonts with optimal loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Three.js for particle magic -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <style>
    /* ================ RESET & VARIABLES ================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Medical color system */
      --primary-green: #00FF88;
      --primary-blue: #00D4FF;
      --primary-red: #FF3366;
      --bg-deep: #03050B;
      --glass-bg: rgba(10, 20, 30, 0.65);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.6);
      
      /* Glow effects */
      --glow-green: 0 0 30px rgba(0, 255, 136, 0.4);
      --glow-blue: 0 0 30px rgba(0, 212, 255, 0.4);
      --glow-red: 0 0 30px rgba(255, 51, 102, 0.4);
      
      /* Transitions */
      --transition-slow: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      min-height: 100vh;
      background: var(--bg-deep);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ================ WEBGL CANVAS ================ */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.8;
      pointer-events: none;
    }

    /* ================ MEDICAL GRID OVERLAY ================ */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 2;
      pointer-events: none;
      animation: gridFloat 60s linear infinite;
    }

    @keyframes gridFloat {
      to { transform: translateY(40px) translateX(40px); }
    }

    /* ================ MAIN LOADER ================ */
    .loader-container {
      position: relative;
      z-index: 10;
      width: min(680px, 92%);
      padding: clamp(2rem, 6vw, 4rem);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 255, 136, 0.15);
      border-radius: 48px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 136, 0.1) inset;
      animation: containerAppear 0.8s var(--transition-slow);
    }

    @keyframes containerAppear {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(20px);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    /* ================ REAL-TIME ECG ================ */
    .ecg-container {
      margin-bottom: 2.5rem;
      height: 80px;
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      background: rgba(0, 0, 0, 0.3);
    }

    #ecg-canvas {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 0 8px var(--primary-green));
    }

    /* ================ MEDICAL ICON WITH PULSE ================ */
    .icon-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0 2.5rem;
      position: relative;
    }

    .medical-core {
      width: 140px;
      height: 140px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--primary-green);
      border-bottom-color: var(--primary-blue);
      animation: spin 4s linear infinite;
    }

    .pulse-ring:nth-child(2) {
      inset: 15px;
      border-top-color: var(--primary-blue);
      border-bottom-color: var(--primary-red);
      animation-direction: reverse;
      animation-duration: 3s;
    }

    .pulse-ring:nth-child(3) {
      inset: 30px;
      border-top-color: var(--primary-red);
      border-bottom-color: var(--primary-green);
      animation-duration: 5s;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .caduceus-icon {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, rgba(0, 255, 136, 0.2), transparent 70%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      animation: iconBreath 2.2s ease-in-out infinite;
    }

    @keyframes iconBreath {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .caduceus-icon svg {
      width: 60px;
      height: 60px;
      filter: drop-shadow(0 0 20px var(--primary-green));
    }

    /* ================ TYPOGRAPHY ================ */
    .brand {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 8vw, 5rem);
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    .brand-med {
      background: linear-gradient(135deg, #fff 0%, var(--primary-green) 50%, var(--primary-blue) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-ai {
      background: linear-gradient(135deg, var(--primary-red) 0%, #FF8A5C 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .status-badge {
      text-align: center;
      margin-bottom: 2rem;
    }

    #status-text {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: rgba(0, 255, 136, 0.1);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      display: inline-block;
      border: 1px solid rgba(0, 255, 136, 0.2);
      backdrop-filter: blur(4px);
    }

    /* ================ PROGRESS ================ */
    .progress-section {
      margin: 2rem 0 1.5rem;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, 
        var(--primary-green) 0%,
        var(--primary-blue) 50%,
        var(--primary-red) 100%);
      border-radius: 6px;
      transition: width 0.3s ease;
      position: relative;
      box-shadow: 0 0 20px var(--primary-green);
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }

    #hex-token {
      color: var(--primary-green);
      text-shadow: 0 0 8px var(--primary-green);
      background: rgba(0, 255, 136, 0.05);
      padding: 0.25rem 0.75rem;
      border-radius: 30px;
      border: 1px solid rgba(0, 255, 136, 0.2);
    }

    #percentage {
      color: var(--primary-blue);
      font-weight: 700;
      background: rgba(0, 212, 255, 0.05);
      padding: 0.25rem 0.75rem;
      border-radius: 30px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    /* ================ SYSTEM METRICS ================ */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0, 255, 136, 0.15);
    }

    .metric-item {
      text-align: center;
    }

    .metric-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--primary-green);
      text-shadow: 0 0 10px var(--primary-green);
      transition: all 0.3s ease;
    }

    /* ================ FADE OUT ================ */
    .fade-out {
      animation: fadeOut 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
      100% {
        opacity: 0;
        transform: scale(1.2);
        filter: blur(20px);
      }
    }
  </style>
</head>
<body>
  <!-- WebGL Canvas for particles -->
  <div id="canvas-container"></div>
  
  <!-- Grid overlay -->
  <div class="grid-overlay"></div>

  <!-- Main Loader -->
  <div class="loader-container" id="loader">
    <!-- Real-time ECG -->
    <div class="ecg-container">
      <canvas id="ecg-canvas" width="600" height="80"></canvas>
    </div>

    <!-- Medical Icon with rotating rings -->
    <div class="icon-container">
      <div class="medical-core">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="caduceus-icon">
          <!-- Medical SVG (Caduceus/Winged staff) -->
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 10 L50 90 M50 10 L30 30 L50 30 L70 30 L50 10 M50 90 L30 70 L50 70 L70 70 L50 90" 
                  stroke="url(#grad)" stroke-width="6" stroke-linecap="round" fill="none"/>
            <circle cx="50" cy="30" r="6" fill="#00FF88" filter="url(#glow)"/>
            <circle cx="50" cy="70" r="6" fill="#00D4FF" filter="url(#glow)"/>
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00FF88"/>
                <stop offset="50%" stop-color="#00D4FF"/>
                <stop offset="100%" stop-color="#FF3366"/>
              </linearGradient>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                <feMerge>
                  <feMergeNode in="coloredBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>
          </svg>
        </div>
      </div>
    </div>

    <!-- Brand -->
    <div class="brand">
      <span class="brand-med">MED</span><span class="brand-ai">AI</span>
    </div>

    <!-- Status -->
    <div class="status-badge">
      <div id="status-text">Initializing Neural Core</div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <div class="progress-stats">
        <span id="hex-token">0x0000 0000</span>
        <span id="percentage">0%</span>
      </div>
    </div>

    <!-- System Metrics -->
    <div class="metrics-grid">
      <div class="metric-item">
        <div class="metric-label">System</div>
        <div class="metric-value" id="system-status">BOOT</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">Region</div>
        <div class="metric-value" id="region-display">SCAN</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">Security</div>
        <div class="metric-value" id="security-level">L1</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ================ THREE.JS PARTICLE BACKGROUND ================
      function initParticles() {
        const container = document.getElementById('canvas-container');
        if (!container) return;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050B);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Create particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i += 3) {
          // Positions
          posArray[i] = (Math.random() - 0.5) * 100;
          posArray[i+1] = (Math.random() - 0.5) * 100;
          posArray[i+2] = (Math.random() - 0.5) * 100;

          // Colors (medical greens and blues)
          const colorChoice = Math.random();
          if (colorChoice < 0.5) {
            colorArray[i] = 0;      // R
            colorArray[i+1] = 1;     // G
            colorArray[i+2] = 0.5;   // B
          } else {
            colorArray[i] = 0;        // R
            colorArray[i+1] = 0.8;    // G
            colorArray[i+2] = 1;      // B
          }
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
          size: 0.15,
          vertexColors: true,
          transparent: true,
          opacity: 0.6,
          blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Animation
        function animate() {
          requestAnimationFrame(animate);
          particlesMesh.rotation.y += 0.0002;
          particlesMesh.rotation.x += 0.0001;
          renderer.render(scene, camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      // ================ REAL ECG WITH MEDICAL PRECISION ================
      class ECGMonitor {
        constructor(canvasId) {
          this.canvas = document.getElementById(canvasId);
          if (!this.canvas) return;
          
          this.ctx = this.canvas.getContext('2d');
          this.width = this.canvas.width = 600;
          this.height = this.canvas.height = 80;
          this.offset = 0;
          
          // Real ECG waveform pattern (medical grade)
          this.ecgPattern = [
            40, 40, 40, 40, 40, 40, 40, 40, 40, 40,  // Baseline
            40, 40, 40, 40, 40, 40, 40, 40, 40, 40,
            40, 40, 40, 40, 40, 40, 40, 40, 40, 40,
            45, 50, 55, 60, 65, 70, 75, 75, 70, 60,  // P wave
            50, 40, 35, 30, 30, 30, 35, 40, 45, 50,
            60, 70, 75, 75, 70, 60, 50, 40, 40, 40,  // QRS complex
            40, 40, 40, 40, 40, 40, 40, 40, 40, 40,
            45, 50, 55, 60, 65, 65, 60, 55, 50, 45,  // T wave
            40, 40, 40, 40, 40, 40, 40, 40, 40, 40,
            40, 40, 40, 40, 40, 40, 40, 40, 40, 40
          ];
          
          this.start();
        }

        draw() {
          this.ctx.clearRect(0, 0, this.width, this.height);
          
          // Draw grid
          this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.15)';
          this.ctx.lineWidth = 0.5;
          
          // Vertical grid lines
          for (let i = 0; i < this.width; i += 20) {
            this.ctx.beginPath();
            this.ctx.moveTo(i, 0);
            this.ctx.lineTo(i, this.height);
            this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            this.ctx.stroke();
          }
          
          // Horizontal grid lines
          for (let i = 0; i < this.height; i += 20) {
            this.ctx.beginPath();
            this.ctx.moveTo(0, i);
            this.ctx.lineTo(this.width, i);
            this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            this.ctx.stroke();
          }

          // Draw ECG wave
          this.ctx.beginPath();
          this.ctx.strokeStyle = '#00FF88';
          this.ctx.lineWidth = 2.5;
          this.ctx.shadowColor = '#00FF88';
          this.ctx.shadowBlur = 15;
          this.ctx.shadowOffsetX = 0;
          this.ctx.shadowOffsetY = 0;

          for (let i = 0; i < this.width; i++) {
            const patternIndex = (i + this.offset) % this.ecgPattern.length;
            const y = this.ecgPattern[patternIndex];
            if (i === 0) {
              this.ctx.moveTo(i, y);
            } else {
              this.ctx.lineTo(i, y);
            }
          }

          this.ctx.stroke();
          this.ctx.shadowBlur = 0;

          this.offset = (this.offset + 1) % this.ecgPattern.length;
          requestAnimationFrame(() => this.draw());
        }

        start() {
          this.draw();
        }
      }

      // ================ LOADER LOGIC ================
      class MedicalLoader {
        constructor() {
          this.progress = 0;
          this.duration = 35000; // 35 seconds
          this.step = 200;
          this.increment = 100 / (this.duration / this.step);
          
          // Elements
          this.bar = document.getElementById('progress-fill');
          this.percentage = document.getElementById('percentage');
          this.hexToken = document.getElementById('hex-token');
          this.statusText = document.getElementById('status-text');
          this.systemStatus = document.getElementById('system-status');
          this.regionDisplay = document.getElementById('region-display');
          this.securityLevel = document.getElementById('security-level');
          this.loader = document.getElementById('loader');

          // Status messages
          this.messages = [
            "INITIALIZING NEURAL MATRIX",
            "CALIBRATING BIOSENSORS",
            "LOADING MEDICAL DATABASE",
            "ESTABLISHING SECURE LINK",
            "SYNCING GLOBAL HEALTH DATA",
            "ANALYZING BIOMETRICS",
            "ACTIVATING DIAGNOSTICS",
            "SYSTEM READY"
          ];

          // Security levels
          this.secureLevels = ['L1', 'L2', 'L3', 'L4', 'L5'];
          
          this.init();
        }

        async init() {
          // Get region with fallbacks
          this.getRegion();
          
          // Start loader
          this.startLoader();
        }

        async getRegion() {
          try {
            // Try IP first
            const ipResponse = await fetch('https://ipapi.co/json/').catch(() => null);
            if (ipResponse?.ok) {
              const data = await ipResponse.json();
              this.regionDisplay.textContent = data.country_name || 'GLOBAL';
              this.regionDisplay.style.textShadow = '0 0 15px #00FF88';
            }

            // Try GPS for precision
            if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(
                async (pos) => {
                  try {
                    const gpsResponse = await fetch(
                      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`
                    );
                    if (gpsResponse.ok) {
                      const data = await gpsResponse.json();
                      this.regionDisplay.textContent = data.address?.state || data.address?.country || this.regionDisplay.textContent;
                    }
                  } catch (e) {
                    console.debug('GPS reverse geocoding failed');
                  }
                },
                () => console.debug('GPS permission denied')
              );
            }
          } catch (e) {
            console.debug('Region detection failed, using default');
            this.regionDisplay.textContent = 'GLOBAL';
          }
        }

        startLoader() {
          const loop = setInterval(() => {
            this.progress += this.increment;
            
            if (this.progress >= 100) {
              this.progress = 100;
              clearInterval(loop);
              this.complete();
            }

            this.updateUI();
          }, this.step);
        }

        updateUI() {
          // Update progress bar
          this.bar.style.width = `${this.progress}%`;
          this.percentage.textContent = `${Math.floor(this.progress)}%`;

          // Update hex token (cryptographic random)
          const randomHex = Array.from({ length: 8 }, () => 
            Math.floor(Math.random() * 16).toString(16)
          ).join('').toUpperCase();
          this.hexToken.textContent = `0x${randomHex}`;

          // Update status message
          const messageIndex = Math.floor((this.progress / 100) * this.messages.length);
          this.statusText.textContent = this.messages[Math.min(messageIndex, this.messages.length - 1)];

          // Update security level
          const secIndex = Math.floor((this.progress / 100) * this.secureLevels.length);
          this.securityLevel.textContent = this.secureLevels[Math.min(secIndex, this.secureLevels.length - 1)];

          // Update system status
          if (this.progress > 30) this.systemStatus.textContent = 'ACTIVE';
          if (this.progress > 60) this.systemStatus.textContent = 'OPTIMIZED';
          if (this.progress > 85) this.systemStatus.textContent = 'READY';
        }

        complete() {
          this.statusText.textContent = 'ACCESS GRANTED';
          this.securityLevel.textContent = 'L5';
          this.systemStatus.textContent = 'READY';
          
          setTimeout(() => {
            this.loader.classList.add('fade-out');
            setTimeout(() => {
              window.location.href = 'https://med-ai.com/dashboard'; // Replace with your URL
            }, 1200);
          }, 1500);
        }
      }

      // ================ INITIALIZE EVERYTHING ================
      window.addEventListener('load', () => {
        // Start particles (non-blocking)
        setTimeout(initParticles, 100);
        
        // Start ECG
        new ECGMonitor('ecg-canvas');
        
        // Start loader
        new MedicalLoader();
      });
    })();
  </script>
</body>
</html>
