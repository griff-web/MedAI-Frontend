<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI </title>
    <style>
        :root {
            --ke-black: #000000;
            --ke-red: #BB0000;
            --ke-green: #006600;
            --ke-white: #FFFFFF;
            --light-gray: #f4f4f4;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ke-black);
            background-image: linear-gradient(180deg, var(--ke-black) 0%, #1a1a1a 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .chat-container {
            width: 95%;
            max-width: 700px;
            height: 85vh;
            background: var(--ke-white);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 8px solid var(--ke-red);
            border-bottom: 8px solid var(--ke-green);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Header Area */
        header {
            padding: 15px 20px;
            background: var(--ke-white);
            color: var(--ke-black);
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shield-logo {
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--ke-red);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-toggle {
            background: #eee;
            padding: 4px;
            border-radius: 50px;
            display: flex;
        }

        .mode-btn {
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: 0.3s;
            background: transparent;
            color: #666;
        }

        .mode-btn.active {
            background: var(--ke-black);
            color: white;
        }

        .doctor-active .mode-btn.active {
            background: var(--ke-red);
        }

        /* Chat Window */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f9f9f9;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--ke-black);
        }

        .bot {
            background: #e8e8e8;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user {
            background: var(--ke-green);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .doctor-active .user {
            background: var(--ke-red);
        }

        /* Medical Content Styling */
        .med-title { font-weight: bold; color: var(--ke-red); display: block; margin-bottom: 5px; }
        .clinical-data { 
            font-family: monospace; 
            background: #222; 
            color: #00ff00; 
            padding: 10px; 
            border-radius: 5px; 
            margin-top: 10px;
            font-size: 0.85rem;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        button#send-btn {
            background: var(--ke-black);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chat-container" id="main-frame">
    <header>
        <div class="shield-logo">
            <span>MedAI</span> 
        </div>
        <div class="mode-toggle">
            <button class="mode-btn active" id="p-tab" onclick="setMode('patient')">Patient</button>
            <button class="mode-btn" id="d-tab" onclick="setMode('doctor')">Doctor</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="message bot">
            Jambo! I am your medical assistant. <br><br>
            <strong>Patients:</strong> Ask me about Malaria, COVID, Typhoid, DPT, or Ulcers.<br>
            <strong>Doctors:</strong> Switch modes for clinical guidelines and ICD-10 codes.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="e.g., Hi do you know Malaria?" onkeypress="checkEnter(event)">
        <button id="send-btn" onclick="processMsg()">Send</button>
    </div>
</div>

<script>
    let mode = 'patient';

    function setMode(m) {
        mode = m;
        document.getElementById('main-frame').className = 'chat-container ' + (m === 'doctor' ? 'doctor-active' : '');
        document.getElementById('p-tab').className = 'mode-btn ' + (m === 'patient' ? 'active' : '');
        document.getElementById('d-tab').className = 'mode-btn ' + (m === 'doctor' ? 'active' : '');
        
        const notice = document.createElement('div');
        notice.className = 'message bot';
        notice.style.fontStyle = 'italic';
        notice.style.fontSize = '0.8rem';
        notice.innerHTML = m === 'doctor' ? "System set to Professional Mode (Clinical Level 4)" : "System set to Patient Mode (Simple Language)";
        document.getElementById('chat-window').appendChild(notice);
    }

    function checkEnter(e) { if (e.key === 'Enter') processMsg(); }

    function processMsg() {
        const input = document.getElementById('user-input');
        const chat = document.getElementById('chat-window');
        if (!input.value.trim()) return;

        const uMsg = document.createElement('div');
        uMsg.className = 'message user';
        uMsg.innerText = input.value;
        chat.appendChild(uMsg);

        const val = input.value.toLowerCase();
        input.value = "";

        setTimeout(() => {
            const bMsg = document.createElement('div');
            bMsg.className = 'message bot';
            bMsg.innerHTML = getClinicalLogic(val);
            chat.appendChild(bMsg);
            chat.scrollTop = chat.scrollHeight;
        }, 500);
    }

    function getClinicalLogic(q) {
        const knows = q.includes('hi do you know') || q.includes('what is') || q.includes('info');
        
        if (mode === 'patient') {
            if (q.includes('malaria')) return "<span class='med-title'>Malaria</span>It's a disease spread by mosquitoes. It causes high fever and shaking chills. In Kenya, it's common, but very treatable with the right medicine from a clinic.";
            if (q.includes('covid')) return "<span class='med-title'>COVID-19</span>A respiratory virus. It feels like a bad flu with cough and fever. Protect yourself by washing hands and staying up to date with vaccines.";
            if (q.includes('typhoid')) return "<span class='med-title'>Typhoid</span>Caused by bacteria in dirty water or food. It causes a very high fever and stomach pain. Always boil your drinking water!";
            if (q.includes('dpt')) return "<span class='med-title'>DPT Vaccine</span>This is a '3-in-1' shot given to babies to protect them from Diphtheria, Pertussis (whooping cough), and Tetanus.";
            if (q.includes('ulcer')) return "<span class='med-title'>Stomach Ulcers</span>Small sores on the lining of your stomach. They cause burning pain. It's often caused by bacteria called H. Pylori, not just spicy food!";
            return "I'm here to help! Ask me about Malaria, Typhoid, COVID, DPT, or Ulcers.";
        } else {
            // DOCTOR MODE
            if (q.includes('malaria')) return "<span class='med-title'>Plasmodium Falciparum (Malaria)</span>Gold standard diagnosis: Giemsa-stained blood smear (mRDT for field use). <div class='clinical-data'>First-line: AL (Artemether-lumefantrine). ICD-10: B50.9</div>";
            if (q.includes('covid')) return "<span class='med-title'>SARS-CoV-2 Protocol</span>Monitor SpO2 levels. Use dexamethasone only for patients requiring supplemental oxygen.<div class='clinical-data'>ICD-10: U07.1 | Monitor for cytokine storm.</div>";
            if (q.includes('typhoid')) return "<span class='med-title'>Typhoid Fever (S. Typhi)</span>Diagnosis via blood culture (Widal test has low specificity). <div class='clinical-data'>Treatment: Ceftriaxone or Azithromycin. Watch for intestinal perforation.</div>";
            if (q.includes('dpt')) return "<span class='med-title'>DTP/Pentavalent Coverage</span>Administered at 6, 10, and 14 weeks in the KEPI schedule (Kenya Expanded Programme on Immunization).<div class='clinical-data'>Protects against C. diphtheriae, B. pertussis, and C. tetani.</div>";
            if (q.includes('ulcer')) return "<span class='med-title'>Peptic Ulcer Disease (PUD)</span>Commonly H. pylori positive or NSAID-induced. <div class='clinical-data'>Rx: Triple Therapy (PPI + Clarithromycin + Amoxicillin). ICD-10: K27</div>";
            return "<strong>Clinician Dashboard:</strong> Enter disease name for Kenyan National Clinical Guidelines summary.";
        }
    }
</script>

</body>
</html>
